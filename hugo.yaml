baseURL: 'https://muvosl.github.io/moss-vein/'
title: 'vein'
locale: 'zh-CN'
hasCJKLanguage: true
enableGitInfo: true

permalinks:
  post: /post/:slug/

ignoreFiles:
  - '\.obsidian'
  - '\.trash'
  - 'moss_model'

outputs:
  home:
    - HTML
    - RSS
    - Algolia

outputFormats:
  Algolia:
    baseName: algolia
    isPlainText: true
    mediaType: application/json
    notAlternative: true