name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.164.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build with Hugo
        run: hugo --minify

      - name: Upload index to Algolia
        env:
          ALGOLIA_APP_ID: JD1L8Q7IF8
          ALGOLIA_WRITE_KEY: ${{ secrets.ALGOLIA_WRITE_KEY }}
        run: |
          node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('public/algolia.json', 'utf8'));
          const batch = { requests: data.map(item => ({ action: 'addObject', body: item })) };
          fs.writeFileSync('public/algolia_batch.json', JSON.stringify(batch));
          console.log('Index records:', data.length);
          "
          curl -s -X POST "https://${ALGOLIA_APP_ID}.algolia.net/1/indexes/moss-vein/batch" \
            -H "X-Algolia-API-Key: ${ALGOLIA_WRITE_KEY}" \
            -H "X-Algolia-Application-Id: ${ALGOLIA_APP_ID}" \
            -H "Content-Type: application/json" \
            --data-binary @public/algolia_batch.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4